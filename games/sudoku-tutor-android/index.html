<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sudoku Tutor — Shared Puzzle</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; text-align: center; padding: 24px;
    }
    main { max-width: 28rem; }
    h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
    p { margin: 0.5rem 0; line-height: 1.5; color: #94a3b8; }
    a.button {
      display: inline-block; margin-top: 1rem; padding: 0.75rem 1.25rem; border-radius: 999px;
      text-decoration: none; font-weight: 600;
    }
    a.primary { background: #38bdf8; color: #0f172a; }
    a.secondary { background: transparent; color: #38bdf8; }
  </style>
</head>
<body>
  <main>
    <h1>Sudoku Tutor</h1>
    <p id="msg">Opening your puzzle…</p>
    <p><a id="openLink" class="button primary" href="#">Open puzzle in app</a></p>
    <p><a id="storeLink" class="button secondary" href="#">Get Sudoku Tutor on Google Play</a></p>
  </main>
  <script>
    (function () {
      var PACKAGE = "com.github.jcaldwell78.sudoku";
      var STORE = "https://play.google.com/store/apps/details?id=" + PACKAGE;
      var code = new URLSearchParams(window.location.search).get("p");

      var storeLink = document.getElementById("storeLink");
      var openLink = document.getElementById("openLink");
      var msg = document.getElementById("msg");
      storeLink.href = STORE;

      if (!code) {
        msg.textContent = "Get the app to start solving.";
        openLink.style.display = "none";
        window.location.href = STORE;
        return;
      }

      // Use an Android intent:// URL, not the bare sudokututor:// custom scheme. Chromium-based
      // browsers — including Chrome and Facebook/Instagram in-app browsers — launch the installed
      // app from intent:// and honor browser_fallback_url when it is not installed. A bare custom
      // scheme is rejected by most in-app WebViews (ERR_UNKNOWN_URL_SCHEME), which is why a tapped
      // link there used to dead-end on the Play Store even with the app installed.
      var intentUrl =
        "intent://puzzle/" + encodeURIComponent(code) +
        "#Intent;scheme=sudokututor;package=" + PACKAGE +
        ";S.browser_fallback_url=" + encodeURIComponent(STORE) + ";end";

      // Manual escape hatch: some in-app browsers block *automatic* app launches but allow a
      // user-initiated tap. Wire the button to the same intent URL.
      openLink.href = intentUrl;

      // Safety net for browsers that don't act on intent:// at all (rare on Android): if we're
      // still here after a moment, send the user to the Play Store. If the app opens, the page is
      // backgrounded and we cancel the redirect.
      var fallback = setTimeout(function () {
        msg.textContent = "Don't have the app yet? Tap “Get Sudoku Tutor on Google Play”.";
        window.location.href = STORE;
      }, 2500);

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) clearTimeout(fallback);
      });

      window.location.href = intentUrl;
    })();
  </script>
</body>
</html>
